<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nakakei6439 — アプリ一覧</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      color: #1C1C1E;
      background: #F2F2F7;
      line-height: 1.7;
    }

    header {
      background: #FFFFFF;
      text-align: center;
      padding: 60px 20px 40px;
    }

    header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    header p {
      font-size: 15px;
      color: #8E8E93;
      margin-top: 8px;
    }

    section {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 700;
      color: #8E8E93;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 16px;
    }

    .app-card {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: #1C1C1E;
    }

    .app-card:hover {
      opacity: 0.8;
    }

    .app-icon {
      width: 60px;
      height: 60px;
      background: #E8692A;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      flex-shrink: 0;
    }

    .app-info {
      flex: 1;
    }

    .app-name {
      font-size: 17px;
      font-weight: 700;
    }

    .app-desc {
      font-size: 13px;
      color: #8E8E93;
      margin-top: 2px;
    }

    .chevron {
      font-size: 20px;
      color: #C7C7CC;
    }

    footer {
      text-align: center;
      padding: 24px 20px 48px;
      font-size: 13px;
      color: #8E8E93;
    }
  </style>
</head>
<body>

  <header>
    <h1>nakakei6439</h1>
    <p>iOS アプリ開発</p>
  </header>

  <section>
    <p class="section-label">アプリ</p>

    <a class="app-card" href="./kondate-cart/">
      <div class="app-icon">🛒</div>
      <div class="app-info">
        <div class="app-name">献立カート</div>
        <div class="app-desc">週の献立を決めて、衝動買いをなくす</div>
      </div>
      <span class="chevron">›</span>
    </a>

  </section>

  <footer>
    <p>© 2026 Keita Nakagawa. All rights reserved.</p>
  </footer>

</body>
</html>
