    var SUPPORTED = Object.keys(I18N);

    function detectLang() {
      var saved = localStorage.getItem('site-lang');
      if (saved && SUPPORTED.indexOf(saved) !== -1) return saved;
      var langs = (navigator.languages && navigator.languages.length) ? navigator.languages : [navigator.language || 'en'];
      for (var i = 0; i < langs.length; i++) {
        var lower = langs[i].toLowerCase();
        if (lower.indexOf('zh') === 0) {
          if (lower.indexOf('hant') !== -1 || lower.indexOf('-tw') !== -1 || lower.indexOf('-hk') !== -1 || lower.indexOf('-mo') !== -1) {
            return 'zh-Hant';
          }
          return 'zh-Hans';
        }
        var base = lower.split('-')[0];
        if (I18N.hasOwnProperty(base)) return base;
      }
      return 'en';
    }

    function applyLang(lang) {
      var dict = I18N[lang] || I18N.en;
      document.documentElement.lang = lang;
      if (dict.title) document.title = dict.title;
      var nodes = document.querySelectorAll('[data-i18n]');
      for (var i = 0; i < nodes.length; i++) {
        var key = nodes[i].getAttribute('data-i18n');
        if (dict[key] != null) nodes[i].textContent = dict[key];
      }
      localStorage.setItem('site-lang', lang);
      var select = document.getElementById('lang-select');
      if (select) select.value = lang;
    }

    var currentLang = detectLang();
    document.getElementById('lang-select').addEventListener('change', function (e) {
      applyLang(e.target.value);
    });
    applyLang(currentLang);
